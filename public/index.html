<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mod Update Manager</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h1>Mod Update Manager</h1>
  <div class="profile-selector">
    <label for="profile-select">Profile:</label>
    <select id="profile-select"></select>
  </div>
  <div class="meta" id="instance-meta">Loading instance data...</div>
  <div class="stats" id="stats" style="display:none">
    <div class="stat stat-breaking">
      <div class="number" id="stat-breaking">0</div>
      <div class="label">Breaking Changes</div>
    </div>
    <div class="stat stat-caution">
      <div class="number" id="stat-caution">0</div>
      <div class="label">Caution</div>
    </div>
    <div class="stat stat-review-deps">
      <div class="number" id="stat-review-deps">0</div>
      <div class="label">Review Deps</div>
    </div>
    <div class="stat stat-safe">
      <div class="number" id="stat-safe">0</div>
      <div class="label">Safe to Update</div>
    </div>
    <div class="stat stat-update">
      <div class="number" id="stat-update">0</div>
      <div class="label">Updates Available</div>
    </div>
    <div class="stat stat-ok">
      <div class="number" id="stat-ok">0</div>
      <div class="label">Up to Date</div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-primary" id="btn-scan">Scan for Updates</button>
  <label><input type="checkbox" id="opt-nocache"> No Cache</label>
  <label><input type="checkbox" id="opt-changelogs"> Check Changelogs</label>
  <label>Limit: <input type="number" id="opt-limit" min="0" value="0" placeholder="0=all"></label>
  <label><input type="checkbox" id="opt-llm" disabled> LLM Analysis</label>
  <button class="btn btn-settings" id="btn-settings">&#9881;</button>
</div>

<div class="progress-container" id="progress-container">
  <div class="progress-info">
    <span id="progress-text">Starting scan...</span>
    <span id="progress-count">0 / 0</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
</div>

<div id="results"></div>

<!-- Refs Modal -->
<div class="modal-overlay" id="refs-modal">
  <div class="modal">
    <h3 id="refs-modal-title">References</h3>
    <div class="modal-body" id="refs-modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('refs-modal')">Close</button>
    </div>
  </div>
</div>

<!-- Dependencies Modal -->
<div class="modal-overlay" id="deps-modal">
  <div class="modal">
    <h3 id="deps-modal-title">Dependencies</h3>
    <div class="modal-body" id="deps-modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('deps-modal')">Close</button>
    </div>
  </div>
</div>

<!-- Flagged Changelogs Modal -->
<div class="modal-overlay" id="changelog-modal">
  <div class="modal" style="max-width:800px">
    <h3 id="changelog-modal-title">Flagged Changelogs</h3>
    <div class="modal-body" id="changelog-modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('changelog-modal')">Close</button>
    </div>
  </div>
</div>

<!-- Apply Confirmation Modal -->
<div class="modal-overlay" id="apply-modal">
  <div class="modal">
    <h3 id="apply-modal-title">Confirm Apply</h3>
    <div class="modal-body" id="apply-modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('apply-modal')">Cancel</button>
      <button class="btn btn-confirm" id="apply-modal-confirm">Apply</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal" style="max-width:550px">
    <h3>Settings</h3>
    <div class="modal-body">
      <div class="settings-section">
        <h4>LLM Analysis</h4>
        <div class="settings-field">
          <label for="settings-llm-enabled">Enabled</label>
          <input type="checkbox" id="settings-llm-enabled">
        </div>
        <div class="settings-field">
          <label for="settings-llm-endpoint">Endpoint</label>
          <input type="text" id="settings-llm-endpoint" placeholder="http://localhost:1234/v1/chat/completions">
        </div>
        <div class="settings-field">
          <label for="settings-llm-apikey">API Key</label>
          <input type="password" id="settings-llm-apikey" placeholder="Optional">
        </div>
        <div class="settings-field">
          <label for="settings-llm-model">Model</label>
          <input type="text" id="settings-llm-model" placeholder="Model name">
        </div>
        <div class="settings-field">
          <label for="settings-llm-maxtokens">Max Tokens</label>
          <input type="number" id="settings-llm-maxtokens" min="64" max="4096" value="1024">
        </div>
        <div class="settings-field">
          <label for="settings-llm-temperature">Temperature</label>
          <input type="number" id="settings-llm-temperature" min="0" max="2" step="0.1" value="0.1">
        </div>
        <div class="settings-field">
          <label for="settings-llm-concurrency">Concurrency</label>
          <input type="number" id="settings-llm-concurrency" min="1" max="10" value="2">
          <button class="btn btn-download" id="btn-detect-concurrency">Detect</button>
          <span id="detect-concurrency-result" style="font-size:0.85rem;color:var(--muted)"></span>
        </div>
        <div class="settings-field">
          <button class="btn btn-download" id="btn-test-llm">Test Connection</button>
          <span id="test-llm-result" style="font-size:0.85rem;color:var(--muted)"></span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('settings-modal')">Cancel</button>
      <button class="btn btn-confirm" id="btn-save-settings">Save</button>
    </div>
  </div>
</div>

<div class="footer">
  Mod Update Manager &middot; CurseForge API v1
</div>

<script src="app.js"></script>
</body>
</html>
